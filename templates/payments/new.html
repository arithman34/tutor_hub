{% extends "layouts/app.html" %}

{% block title %}Add Payment — TutorHub{% endblock %}

{% block page_content %}
<div class="flex items-center gap-3 mb-6">
    <a href="/payments" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
    </a>
    <h1 class="text-2xl font-bold">Add Payment</h1>
</div>

<div class="th-card p-6 max-w-lg">
    <form method="POST" action="/payments" class="space-y-4">
        <div>
            <label class="th-label">Payee</label>
            <select name="payee_id" required
                class="th-input">
                <option value="">— Select payee —</option>
                {% for payee in payees %}
                <option value="{{ payee.id }}" {% if payee.id | string == selected_payee_id %}selected{% endif %}>{{ payee.first_name }} {{ payee.last_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="th-label">Amount (£)</label>
            <input type="number" name="amount" step="0.01" min="0" required
                class="th-input" />
        </div>

        <div>
            <label class="th-label">Payment Date</label>
            <input type="date" name="payment_date" required
                class="th-input" />
        </div>

        <div>
            <label class="th-label">Payment Reference (optional)</label>
            <input type="text" name="payment_reference" placeholder="e.g. bank transfer ref"
                class="th-input" />
        </div>

        <div class="pt-2 flex gap-3">
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">Add Payment</button>
            <a href="/payments" class="px-4 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
