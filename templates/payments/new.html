{% extends "layouts/app.html" %}

{% block title %}Add Payment — TutorHub{% endblock %}

{% block page_content %}
<div class="flex items-center gap-3 mb-6">
    <a href="/payments" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
    </a>
    <h1 class="text-2xl font-bold">Add Payment</h1>
</div>

<div class="bg-white rounded-xl border border-gray-200 p-6 max-w-lg">
    <form method="POST" action="/payments" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Payee</label>
            <select name="payee_id" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">— Select payee —</option>
                {% for payee in payees %}
                <option value="{{ payee.id }}">{{ payee.first_name }} {{ payee.last_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Amount (£)</label>
            <input type="number" name="amount" step="0.01" min="0" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Payment Date</label>
            <input type="date" name="payment_date" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Payment Reference (optional)</label>
            <input type="text" name="payment_reference" placeholder="e.g. bank transfer ref"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div class="pt-2 flex gap-3">
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">Add Payment</button>
            <a href="/payments" class="px-4 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-100">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
