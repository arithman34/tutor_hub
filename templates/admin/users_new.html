{% extends "layouts/app.html" %}
{% from "components/forms.html" import password_input %}

{% block title %}Add Tutor — TutorHub{% endblock %}

{% block page_content %}
<div class="flex items-center gap-3 mb-6">
    <a href="/admin/users" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
    </a>
    <h1 class="text-2xl font-bold">Add Tutor</h1>
</div>

<div class="bg-white rounded-xl border border-gray-200 p-6 max-w-lg">
    <form method="POST" action="/admin/users" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                <input type="text" name="first_name" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                <input type="text" name="last_name" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        {{ password_input("Password", id="password", name="password") }}

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Payout Type</label>
            <select name="payout_type" id="payout-type" onchange="togglePayoutFields()"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">— Not set —</option>
                <option value="hourly">Hourly Rate</option>
                <option value="percentage">Percentage</option>
            </select>
        </div>

        <div id="field-hourly" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-1">Hourly Rate (£)</label>
            <input type="number" name="payout_hourly_rate" step="0.01" min="0"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div id="field-percentage" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-1">Percentage (%)</label>
            <input type="number" name="payout_percentage" step="0.1" min="0" max="100"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div class="pt-2 flex gap-3">
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">Add Tutor</button>
            <a href="/admin/users" class="px-4 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-100">Cancel</a>
        </div>
    </form>
</div>

<script>
    function togglePayoutFields() {
        const type = document.getElementById('payout-type').value;
        document.getElementById('field-hourly').classList.toggle('hidden', type !== 'hourly');
        document.getElementById('field-percentage').classList.toggle('hidden', type !== 'percentage');
    }
</script>
{% endblock %}
