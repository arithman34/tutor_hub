{% extends "layouts/app.html" %}

{% block title %}Add Tutor — TutorHub{% endblock %}

{% block page_content %}
<div class="flex items-center gap-3 mb-6">
    <a href="/admin/users" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
    </a>
    <h1 class="text-2xl font-bold">Add Tutor</h1>
</div>

{% if error == 'email_taken' %}
<div class="mb-6 flex items-center gap-3 bg-red-50 border border-red-200 text-red-800 dark:bg-red-900/20 dark:border-red-800 dark:text-red-400 text-sm rounded-lg px-4 py-3">
    <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    That email address is already in use.
</div>
{% endif %}

<div class="th-card p-6 max-w-lg">
    <form method="POST" action="/admin/users" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="th-label">First Name</label>
                <input type="text" name="first_name" required
                    class="th-input" />
            </div>
            <div>
                <label class="th-label">Last Name</label>
                <input type="text" name="last_name" required
                    class="th-input" />
            </div>
        </div>

        <div>
            <label class="th-label">Email</label>
            <input type="email" name="email" required
                class="th-input" />
        </div>

        <div>
            <label class="th-label">Payout Type</label>
            <select name="payout_type" id="payout-type" onchange="togglePayoutFields()"
                class="th-input">
                <option value="">— Not set —</option>
                <option value="hourly">Hourly Rate</option>
                <option value="percentage">Percentage</option>
            </select>
        </div>

        <div id="field-hourly" class="hidden">
            <label class="th-label">Hourly Rate (£)</label>
            <input type="number" name="payout_hourly_rate" step="0.01" min="0"
                class="th-input" />
        </div>

        <div id="field-percentage" class="hidden">
            <label class="th-label">Percentage (%)</label>
            <input type="number" name="payout_percentage" step="0.1" min="0" max="100"
                class="th-input" />
        </div>

        <div class="pt-2 flex gap-3">
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">Add Tutor</button>
            <a href="/admin/users" class="px-4 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700">Cancel</a>
        </div>
    </form>
</div>

<script>
    function togglePayoutFields() {
        const type = document.getElementById('payout-type').value;
        document.getElementById('field-hourly').classList.toggle('hidden', type !== 'hourly');
        document.getElementById('field-percentage').classList.toggle('hidden', type !== 'percentage');
    }
</script>
{% endblock %}
