<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}TutorHub{% endblock %}</title>
    <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="/static/css/components.css" />
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-white">
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
    <script>
        document.addEventListener('click', function (e) {
            const btn = e.target.closest('[data-collapse-toggle]');
            if (!btn) return;
            const targetId = btn.getAttribute('data-collapse-toggle');
            document.querySelectorAll('[data-collapse-toggle]').forEach(function (other) {
                const otherId = other.getAttribute('data-collapse-toggle');
                if (otherId !== targetId) {
                    const el = document.getElementById(otherId);
                    if (el) el.classList.add('hidden');
                }
            });
        });
    </script>
    <script>
        (function () {
            const btn = document.getElementById('theme-toggle');
            if (!btn) return;
            const moon = document.getElementById('theme-icon-moon');
            const sun = document.getElementById('theme-icon-sun');
            const label = document.getElementById('theme-label');

            function syncIcons() {
                const dark = document.documentElement.classList.contains('dark');
                moon.classList.toggle('hidden', dark);
                sun.classList.toggle('hidden', !dark);
                label.textContent = dark ? 'Light mode' : 'Dark mode';
            }

            syncIcons();

            btn.addEventListener('click', function () {
                const dark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', dark ? 'dark' : 'light');
                syncIcons();
            });
        })();

        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const eye = document.getElementById(fieldId + '_eye');
            const eyeSlash = document.getElementById(fieldId + '_eye_slash');
            if (input.type === 'password') {
                input.type = 'text';
                eye.classList.add('hidden');
                eyeSlash.classList.remove('hidden');
            } else {
                input.type = 'password';
                eye.classList.remove('hidden');
                eyeSlash.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
