{% extends "base.html" %}
{% from "components/forms.html" import password_input %}

{% block title %}Login — TutorHub{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow w-full max-w-md dark:bg-gray-800">
        <h1 class="text-2xl font-bold mb-6 text-center">TutorHub</h1>

        {% if error %}
        <div class="bg-red-50 text-red-700 px-4 py-3 rounded mb-4 text-sm dark:bg-red-900/20 dark:text-red-400">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" name="email" required
                    class="th-input" />
            </div>
            {{ password_input("Password", id="password", name="password") }}
            <button type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition">
                Sign in
            </button>
        </form>
    </div>
</div>
{% endblock %}
