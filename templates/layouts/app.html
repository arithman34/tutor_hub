{% extends "base.html" %}

{% block content %}
<div class="flex h-screen">
    <aside class="w-56 bg-white border-r border-gray-200 flex flex-col">
        <div class="px-6 py-5 border-b border-gray-200">
            <span class="text-lg font-bold text-blue-600">TutorHub</span>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-1">
            <a href="/dashboard" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium
                {% if active_page == 'dashboard' %}bg-blue-50 text-blue-600{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                Dashboard
            </a>
            <a href="/students" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium
                {% if active_page == 'students' %}bg-blue-50 text-blue-600{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                Students
            </a>
            <a href="/sessions" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium
                {% if active_page == 'sessions' %}bg-blue-50 text-blue-600{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                Sessions
            </a>
            <a href="/payments" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium
                {% if active_page == 'payments' %}bg-blue-50 text-blue-600{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                Payments
            </a>
            {% if user.is_admin %}
            <div class="pt-3 pb-1 px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">Admin</div>
            <a href="/admin/users" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium
                {% if active_page == 'admin_users' %}bg-blue-50 text-blue-600{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                Users
            </a>
            {% endif %}
        </nav>
        <div class="px-3 py-4 border-t border-gray-200">
            <p class="text-xs text-gray-500 px-3 mb-2">{{ user.first_name }} {{ user.last_name }}</p>
            <form method="POST" action="/logout">
                <button type="submit"
                    class="w-full text-left px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-100">
                    Sign out
                </button>
            </form>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <div class="p-8">
            {% block page_content %}{% endblock %}
        </div>
    </main>
</div>
{% endblock %}
