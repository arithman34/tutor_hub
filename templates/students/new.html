{% extends "layouts/app.html" %}

{% block title %}Add Student — TutorHub{% endblock %}

{% block page_content %}
<div class="flex items-center gap-3 mb-6">
    <a href="/students" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
    </a>
    <h1 class="text-2xl font-bold">Add Student</h1>
</div>

<div class="th-card p-6 max-w-lg">
    <form method="POST" action="/students" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="th-label">First Name</label>
                <input type="text" name="first_name" required
                    class="th-input" />
            </div>
            <div>
                <label class="th-label">Last Name</label>
                <input type="text" name="last_name" required
                    class="th-input" />
            </div>
        </div>
        <div>
            <label class="th-label">Assign to Tutor</label>
            <select name="tutor_id" required
                class="th-input">
                <option value="">— Select tutor —</option>
                {% for tutor in tutors %}
                <option value="{{ tutor.id }}">{{ tutor.first_name }} {{ tutor.last_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="th-label">Level</label>
            <input type="text" name="level" placeholder="e.g. GCSE, A-Level, KS3"
                class="th-input" />
        </div>
        <div>
            <label class="th-label">Hourly Rate (£)</label>
            <input type="number" name="hourly_rate" step="0.01" min="0"
                class="th-input" />
        </div>
        <div>
            <label class="th-label">Payee (optional)</label>
            <select name="payee_id"
                class="th-input">
                <option value="">— No payee —</option>
                {% for payee in payees %}
                <option value="{{ payee.id }}">{{ payee.first_name }} {{ payee.last_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="pt-2 flex gap-3">
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">Add Student</button>
            <a href="/students" class="px-4 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
