{% extends "base.html" %}

{% block title %}Setup Complete — TutorHub{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow w-full max-w-md">
        <h1 class="text-2xl font-bold mb-2 text-center">Setup Complete</h1>
        <p class="text-gray-500 text-sm text-center mb-6">Your admin account has been created.</p>

        <div class="bg-yellow-50 border border-yellow-300 rounded-lg p-4 mb-6">
            <p class="text-sm font-medium text-yellow-800 mb-3">Save this password — it will not be shown again.</p>
            <div class="space-y-1 text-sm">
                <p><span class="font-medium">Email:</span> {{ email }}</p>
                <p><span class="font-medium">Password:</span>
                    <code class="bg-yellow-100 px-2 py-0.5 rounded font-mono">{{ password }}</code>
                </p>
            </div>
        </div>

        <a href="/login"
            class="block text-center w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition">
            Go to Login
        </a>
    </div>
</div>
{% endblock %}
